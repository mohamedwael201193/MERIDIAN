services:
  - type: web
    name: meridian-backend
    runtime: node
    plan: free
    region: frankfurt
    autoDeploy: true
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @meridian/env run build &&
      pnpm --filter @meridian/casper-sdk run build &&
      pnpm --filter @meridian/agents-shared run build &&
      pnpm --filter @meridian/yield-agent run build &&
      pnpm --filter @meridian/compliance-agent run build &&
      pnpm --filter @meridian/audit-agent run build &&
      pnpm --filter @meridian/backend run build
    startCommand: bash scripts/start-backend.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: AGENTS_ENABLED
        value: true
      - key: AGENT_INTERVAL_MS
        value: '300000'
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: CASPER_NETWORK
        value: casper-test
      - key: CASPER_RPC_URL
        value: https://node.testnet.casper.network/rpc
      - key: CASPER_CHAIN_NAME
        value: casper-test
      - key: CASPER_API_KEY
        sync: false
      - key: CASPER_SIDE_CAR_URL
        value: https://api.testnet.cspr.cloud
      - key: CSPR_STREAMING_URL
        value: wss://streaming.testnet.cspr.cloud
      - key: CSPR_CLOUD_AUTH_TOKEN
        sync: false
      - key: MERIDIAN_API_KEY
        sync: false
      - key: MERIDIAN_CONTRACTS_PATH
        value: deployed/addresses.json
      - key: MERIDIAN_VALIDATOR_PUBLIC_KEY
        sync: false
      - key: MERIDIAN_YIELD_AGENT_PUBLIC_KEY
        sync: false
      - key: MERIDIAN_YIELD_AGENT_ACCOUNT_HASH
        sync: false
      - key: MERIDIAN_YIELD_AGENT_PRIVATE_KEY_PEM
        sync: false
      - key: MERIDIAN_COMPLIANCE_AGENT_PUBLIC_KEY
        sync: false
      - key: MERIDIAN_COMPLIANCE_AGENT_ACCOUNT_HASH
        sync: false
      - key: MERIDIAN_COMPLIANCE_AGENT_PRIVATE_KEY_PEM
        sync: false
      - key: MERIDIAN_AUDIT_AGENT_PUBLIC_KEY
        sync: false
      - key: MERIDIAN_AUDIT_AGENT_ACCOUNT_HASH
        sync: false
      - key: MERIDIAN_AUDIT_AGENT_PRIVATE_KEY_PEM
        sync: false
      - key: INDEXER_ENABLED
        value: true
      - key: INDEXER_BACKFILL_ON_START
        value: false
      - key: LOG_LEVEL
        value: info
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: SAMBANOVA_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: X402_FACILITATOR_URL
        sync: false

  - type: web
    name: meridian-x402
    runtime: node
    plan: free
    region: frankfurt
    autoDeploy: true
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @meridian/env run build &&
      pnpm --filter @meridian/casper-sdk run build &&
      pnpm --filter @meridian/x402-facilitator run build
    startCommand: X402_MODE=combined node x402-facilitator/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: X402_MODE
        value: combined
      - key: CASPER_RPC_URL
        value: https://node.testnet.casper.network/rpc
      - key: CASPER_CHAIN_NAME
        value: casper-test
      - key: CASPER_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: X402_PAY_TO_ACCOUNT_HASH
        sync: false
      - key: X402_PAYMENT_AMOUNT_MOTES
        sync: false
      - key: MERIDIAN_DEPLOYER_PRIVATE_KEY_PEM
        sync: false
      - key: X402_FACILITATOR_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: MERIDIAN_API_KEY
        sync: false
      - key: MERIDIAN_TOKEN_PACKAGE
        sync: false
      - key: MERIDIAN_VALIDATOR_PUBLIC_KEY
        sync: false
      - key: OFAC_SDN_FEED_URL
        sync: false

  - type: web
    name: meridian-mcp-server
    runtime: node
    plan: free
    region: frankfurt
    autoDeploy: true
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @meridian/env run build &&
      pnpm --filter @meridian/casper-sdk run build &&
      pnpm --filter @meridian/mcp-server run build
    startCommand: MERIDIAN_MCP_TRANSPORT=http node mcp-server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MERIDIAN_MCP_TRANSPORT
        value: http
      - key: MERIDIAN_MCP_HOST
        value: 0.0.0.0
      - key: BACKEND_URL
        sync: false
      - key: MERIDIAN_API_KEY
        sync: false
      - key: CASPER_NETWORK
        value: casper-test
      - key: CASPER_RPC_URL
        value: https://node.testnet.casper.network/rpc
      - key: CASPER_CHAIN_NAME
        value: casper-test
      - key: CASPER_API_KEY
        sync: false
      - key: CASPER_SIDE_CAR_URL
        value: https://api.testnet.cspr.cloud
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: MERIDIAN_CONTRACTS_PATH
        value: deployed/addresses.json
      - key: X402_FACILITATOR_URL
        sync: false
      - key: X402_RESOURCE_URL
        sync: false
      - key: LOG_LEVEL
        value: info
