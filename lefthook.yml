pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: '*.rs'
      run: cargo fmt --check
    rust-clippy:
      glob: '*.rs'
      run: cargo clippy --workspace -- -D warnings
    prettier:
      glob: '*.{js,ts,json,md,yml,yaml}'
      run: pnpm exec prettier --check {staged_files}
    eslint:
      glob: '*.{js,ts}'
      run: pnpm exec eslint {staged_files}

pre-push:
  commands:
    test:
      run: pnpm test && cargo test --workspace
